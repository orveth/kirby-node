# G10 reproducible + clean-cut gate (build-spec section 6 / gate G10).
# Runs the full test suite and the clippy deny-warnings gate on every push and
# pull request. The clippy gate is enforced HERE (not inside a #[test]) so the
# test binary stays fast; tests/g10_reproducible.rs covers the pure-Rust G10
# checks (em-dash scan + content-address determinism).
#
# NOTE: this workflow assumes a Nix-capable runner with the dev shell from
# flake.nix. It needs gudnuf to confirm a CI runner (self-hosted or a
# nix-installer action) is wired up before it will actually execute.
name: ci

# Trigger ONCE per change. A push to a branch that has an open PR fires BOTH a
# `push` and a `pull_request` event, double-running the same SHA. Restricting
# `push` to `main` means PR branches run only via `pull_request`, and `main`
# runs only on merge -- one run per change either way.
on:
  push:
    branches: [main]
  pull_request:

# Cancel a superseded in-progress run when a newer commit lands on the same ref
# (e.g. a quick follow-up push), so only the latest commit's CI holds the gate.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The full-workspace Nix build (cdk + tonic + firecracker + the genome image)
      # overruns the ~14 GB free on a stock ubuntu-latest runner ("No space left on
      # device"). Reclaim the pre-baked tool caches we never use before the build.
      - name: Free disk space
        # Pinned to a full commit SHA (v1.3.1), not a floating @main, for supply-chain safety.
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          large-packages: false
          swap-storage: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: cargo test
        run: nix develop --command cargo test

      - name: cargo clippy (deny warnings)
        run: nix develop --command cargo clippy -- -D warnings
