syntax = "proto3";

package kirby.gateway.v1;

// The genome's only interface to the outside world. Every method is a
// daemon-mediated choke point (spec 3.1). The genome is the gRPC client, the
// daemon is the server, listening on a vsock port bound to that VM's CID. One
// genome cannot reach another's daemon (distinct CIDs per VM).
service NodeGateway {
  // boot: the genome pulls its non-secret session context (task descriptor,
  // budget snapshot, mint and endpoint identifiers). Never credentials.
  rpc GetSessionContext(SessionRequest) returns (SessionContext);

  // entropy: the resume gate. Returns a fresh per-call nonce the genome MUST
  // mix into any ephemeral secret (spec 3.4).
  rpc GetEntropyNonce(EntropyRequest) returns (EntropyNonce);

  // metering: the genome self-reports app-level events. Host metering via
  // cgroups and eBPF is authoritative; this is supplementary and diagnostic
  // only and is never trusted for billing (spec 3.3).
  rpc ReportEvent(Event) returns (Ack);

  // app checkpoint: the genome pushes a logical-state checkpoint at a safe
  // boundary. The daemon content-addresses and retains the latest blob; this is
  // the portable resume path used when VM snapshots cannot cross backends.
  rpc SubmitCheckpoint(CheckpointBlob) returns (Ack);

  // agency: the brokered-act path. request, then the daemon authorizes against
  // the treasury and meters, then the daemon performs, then a receipt
  // (spec 3.2).
  rpc RequestCapability(CapabilityRequest) returns (CapabilityReceipt);

  // inbound: the genome long-polls for externally-originated events the daemon
  // has VERIFIED and queued for it (earn-loop Component 1). The daemon holds the
  // request open up to a server-side deadline, returning as soon as >=1 event is
  // queued (or an empty batch on deadline, so the genome re-polls). The genome
  // stays a pure client: no socket, no inbound listener, just another OUTBOUND
  // call on the same vsock channel. The daemon is the trust boundary -- it
  // signature-verifies, kind-allowlists (default-deny), size-caps, and re-emits a
  // TYPED InboundEvent; the genome never sees a raw relay frame.
  rpc PollInbox(InboxRequest) returns (InboundBatch);
}

// All messages carry schema_version (starts at 1, additive-only thereafter).

message SessionRequest {
  uint32 schema_version = 1;
}

message SessionContext {
  uint32 schema_version = 1;
  string task_descriptor = 2;   // what the stub genome should do this session
  uint64 budget_sats = 3;       // budget snapshot, non-secret
  repeated string allowlisted_destinations = 4; // mint ids and endpoint hosts, non-secret
  CheckpointRef restore_checkpoint = 5; // optional logical checkpoint ref for a fresh app-level restore
  bytes restore_checkpoint_blob = 6;    // inline checkpoint payload for the spike harness
}

message EntropyRequest {
  uint32 schema_version = 1;
}

message EntropyNonce {
  uint32 schema_version = 1;
  bytes nonce = 2;              // fresh 32 bytes from the host CSPRNG
  uint64 vm_generation = 3;     // current VMGenID generation; bumps on restore
}

message Event {
  uint32 schema_version = 1;
  string kind = 2;             // e.g. "hello", "fingerprint", "raw_egress_attempt"
  string detail = 3;           // free-form diagnostic payload
}

message Ack {
  uint32 schema_version = 1;
}

message CheckpointRef {
  string sha256 = 1;            // lowercase hex SHA-256 of CheckpointBlob.payload
  uint64 len = 2;               // payload byte length
}

message CheckpointBlob {
  uint32 schema_version = 1;
  bytes payload = 2;            // opaque logical genome state, no ephemeral secrets
}

// The capability and treasury-gateway contract (spec 3.2), the load-bearing
// agency surface: request, then authorize, then meter, then perform.

message PayInvoice {
  string bolt11 = 1;
  uint64 max_fee_sats = 2;
}

message SettleEcash {
  string mint_id = 1;
  uint64 amount = 2;
  string recipient_or_quote = 3;
}

message PaidHttp {
  string method = 1;
  string url = 2;
  bytes body = 3;
  uint64 max_cost_sats = 4;    // covers a generic paid service or L402
}

// A chat message, structured so the GENOME never builds JSON (brain-stub F5). prost
// handles the wire; the daemon assembles the OpenAI request JSON from these (the
// RoutstrBrain does later; the StubBrain assembles nothing real).
message ChatMessage {
  string role    = 1;          // "system" | "user" | "assistant"
  string content = 2;
}

// The brain act (brain-stub): a brokered LLM completion. The genome never speaks
// OpenAI HTTP; the daemon proxies to the inference backend, pays, and returns the
// model's reply text. Stub-first behind a BrainBackend trait (StubBrain now,
// RoutstrBrain later, same wire).
message Completion {
  string   model        = 1;   // e.g. "anthropic/claude-sonnet-4.6"
  repeated ChatMessage messages = 2;   // structured (NOT bytes json) -- genome stays dep-free
  uint64   max_cost_sats = 3;  // per-call budget cap (the estimate the gate enforces)
}

// The memory act (durable-mind-state Chunk-1): a brokered, treasury-metered read or
// write of the agent's durable memory store -- the SIBLING of the Completion act. The
// genome never speaks to a relay; the daemon does the store work (Chunk-1 = an in-memory
// StubMemory behind a MemoryBackend trait; Chunk-2 = the real NIP-AE engram store over
// the nerve, same wire). The op tags whether this is a read or a write, which the daemon
// meters OPPOSITELY (design doc 11/12): READS (GET/LS) are served FREE at zero debit and
// bypass the ledger; WRITES (SET/RM) are metered by a HOST-computed storage cost.
//
// PATCH is intentionally absent in Chunk-1 (design doc 10 F2): a diff against a moving
// base mishandles idempotent retry; it returns in Chunk-2 only with explicit base/result
// hashes.
message Memory {
  MemoryOp op            = 1;   // GET | SET | LS | RM
  string   slug          = 2;   // "core" or "mem/..."; empty for LS
  bytes    value         = 3;   // SET payload; empty for GET / LS / RM
  uint64   max_cost_sats = 4;   // WRITES: the caller's authorized CEILING (design doc 12 G2 -- the
                                //   host-computed cost must be <= this or the write is DENIED_OVER_BUDGET;
                                //   the host cost is NEVER clamped down to it). Meaningless for reads.
}

enum MemoryOp {
  MEMORY_OP_UNSPECIFIED = 0;
  GET = 1;   // read one slug (free)
  SET = 2;   // write/replace one slug (metered)
  LS  = 3;   // enumerate slugs (free)
  RM  = 4;   // tombstone one slug (metered)
}

// The structured result of a memory op (design doc 10 F5): raw bytes were ambiguous
// (GET empty == absent? LS encoding? RM already-absent vs tombstoned?), so the receipt
// carries this typed shape. prost-generated, so the genome stays dep-free (no JSON).
message MemoryResult {
  bool   found             = 1;   // GET: was the slug present? RM: did it exist before the tombstone?
  bytes  value             = 2;   // GET: the stored value (empty when found=false)
  repeated string slugs    = 3;   // LS: the live slug list
  bytes  content_hash      = 4;   // SET/RM: the resulting store-dedup id (the d-tag/event seed analog)
  WriteStatus write_status = 5;   // SET/RM: the write outcome; WRITE_STATUS_UNSPECIFIED for a read
}

enum WriteStatus {
  WRITE_STATUS_UNSPECIFIED = 0;  // a read op (GET/LS): no write happened
  STORED = 1;                    // SET committed a value under this write-seq
  REMOVED = 2;                   // RM tombstoned a slug that existed
  ALREADY_ABSENT = 3;            // RM of a slug that was not there (a no-op tombstone)
  // This write-seq already committed this store event (a crash-replay re-perform). The
  // daemon still debits the ORIGINAL cost exactly once (design doc 12 G6); the store
  // effect is unchanged. Chunk-1 models it at the backend; the gateway STEP-1 dedupe
  // normally short-circuits a same-key replay before perform.
  ALREADY_COMMITTED = 4;
}

// The general OUTWARD actuator envelope (the agent's first voice to the world). ONE act
// for MANY outward actions: `kind` selects the typed daemon handler AND is the per-kind
// allowlist token (so a workload without that kind's token issues ZERO of it at the
// gateway allowlist step); `payload` is opaque to the envelope (the handler decodes it as
// its own type). The genome stays EGRESS-LOCKED and dep-free: it prost-encodes a typed
// payload (e.g. NostrPublish) into `payload`, and the DAEMON decodes, RE-VALIDATES (the
// handler is a NEW entry point, it never trusts genome input), signs with the host-held
// node key, sends, and meters per kind on the generic estimate->budget->perform->debit
// path. A new outward action = a new kind + handler + allowlist token, NO new proto act.
message Actuate {
  string kind          = 1;   // the actuator kind + per-kind allowlist token, e.g. "nostr.publish"
  bytes  payload       = 2;   // kind-specific, prost-encoded by the genome, OPAQUE to the envelope
  uint64 max_cost_sats = 3;   // the caller's per-act CEILING (metered like a write; daemon cost <= this)
}

// The payload for the "nostr.publish" actuator kind, prost-encoded into Actuate.payload so
// the genome carries NO JSON. The DAEMON composes + SIGNS a nostr event {kind, content,
// tags} with the NODE identity key and publishes it via the nerve relay path. Defense in
// depth (the handler is a new entry point): the daemon RE-SANITIZES content, RE-CAPS it,
// and RESTRICTS the publishable `kind` set (MVP: 1 only, a public text note), never
// trusting the genome's own sanitize.
message NostrPublish {
  uint32 kind            = 1;   // the nostr event kind (MVP: MUST be 1, a public text note)
  string content         = 2;   // the note text (re-sanitized + re-capped daemon-side)
  repeated NostrTag tags = 3;   // optional event tags (MVP: empty)
}

// One nostr event tag: an ordered list of strings, e.g. ["e", "<id>"] or ["p", "<pubkey>"].
// A nested message because protobuf has no repeated-of-repeated.
message NostrTag {
  repeated string elements = 1;
}

// The earn-loop INBOUND surface (Component 1). The genome's poll request: which
// inbound kinds it wants to be woken for, its consume cursor, and a long-poll budget.
message InboxRequest {
  uint32 schema_version = 1;
  // P2: the genome's subscribe-filter -- which inbound kinds it wants to be woken
  // for. The daemon INTERSECTS this with the session inbound allowlist (1.4); the
  // genome can only NARROW, never widen, what the session permits. Empty => the
  // session's full allowlisted set (a sensible default for a DVM agent).
  repeated InboundKind want_kinds = 2;
  // The highest inbox_seq the genome has already consumed (its cursor). The daemon
  // returns only events with seq > ack_seq, so a redial + re-poll never re-delivers
  // an already-seen event and never skips one (at-least-once becomes exactly-once at
  // the genome via this monotonic cursor; mirrors the gateway idempotency_key idiom).
  uint64 ack_seq = 3;
  // Long-poll budget: the max millis the daemon may hold this request open before
  // returning an empty batch. The daemon CLAMPS to a host max so a hostile value
  // cannot pin a server task forever.
  uint64 wait_ms = 4;
}

// The result of a PollInbox: zero or more typed inbound events plus the high-water
// cursor the genome acks next time.
message InboundBatch {
  uint32 schema_version = 1;
  repeated InboundEvent events = 2;   // size-capped per event (1.3); may be empty on deadline
  uint64 high_seq = 3;                // the highest inbox_seq in this batch (the genome's next ack_seq)
}

// A TYPED, daemon-verified inbound record. The genome NEVER sees a raw relay frame:
// the daemon signature-verifies, kind-allowlists, size-caps, and re-emits this typed
// shape (1.3). `payload` is the TYPED, size-capped body for this kind, NOT a raw event.
message InboundEvent {
  uint64 inbox_seq      = 1;   // daemon-assigned monotonic per-genome cursor
  InboundKind kind      = 2;   // the kind-allowlisted classification (1.3)
  bytes payload         = 3;   // the TYPED, size-capped payload for this kind (NOT a raw event)
  string source_pubkey  = 4;   // the verified author hex pubkey (informational; the daemon already verified the sig)
  uint64 created_at     = 5;   // the source event created_at (informational)
  string correlation_id = 6;   // ties a settlement notice back to a charge_id (Component 2) or a job request id
}

enum InboundKind {
  INBOUND_KIND_UNSPECIFIED = 0;
  // P1 minimum set. Extend additively as new outward surfaces land. For THIS chunk
  // only JOB_REQUEST is wired end-to-end (the earn trigger); the others reserve
  // wire numbers for additive growth.
  JOB_REQUEST       = 1;   // a NIP-90 DVM job request (the earn trigger; relay kinds 5000-5999)
  MENTION           = 2;   // a public mention / reply addressed to the agent
  DIRECT_MESSAGE    = 3;   // a DM addressed to the agent (decrypted host-side; see SAFETY note)
  PAYMENT_SETTLED   = 4;   // "charge X settled, treasury credited" -- the Component 2 settlement notice (daemon-produced)
}

message CapabilityRequest {
  uint32 schema_version = 1;
  string idempotency_key = 2;  // genome-chosen; the daemon dedupes on it (replay safety across a resume)
  oneof act {
    PayInvoice  pay_invoice  = 3;
    SettleEcash settle_ecash = 4;
    PaidHttp    paid_http    = 5;
    Completion  completion   = 7;   // brain act -- field 7, NOT 6 (budget_sats holds 6; oneof + sibling fields share one number space)
    Memory      memory       = 8;   // memory act (durable mind-state) -- next free oneof field after completion=7
    Actuate     actuate      = 9;   // outward actuator envelope (the agent's first outward voice) -- next free oneof field after memory=8
  }
  uint64 budget_sats = 6;      // max the genome authorizes for THIS act; must be <= remaining treasury
}

// The daemon enforces a fixed order, host-side, for every RequestCapability:
// first dedupe on idempotency_key, then allowlist the destination, then the
// budget gate (estimate <= budget_sats AND estimate <= treasury_remaining),
// then perform with the host-held rail credential the genome never sees, then
// meter and debit the actual cost atomically with recording the receipt. The
// actual spend is capped at the estimate so the invariant actual <= estimate <=
// treasury_remaining holds even after perform (spec D-20).
enum Outcome {
  OUTCOME_UNSPECIFIED = 0;
  AUTHORIZED_AND_PERFORMED = 1;
  DENIED_INSUFFICIENT_TREASURY = 2;
  DENIED_OVER_BUDGET = 3;
  DENIED_NOT_ALLOWLISTED = 4;
  UPSTREAM_FAILED = 5;
  DUPLICATE_IGNORED = 6;
  // The node is not the active lease-holder at the current committed term, so it
  // is term-fenced from debiting the treasury (spec 3.5, 4.3, D-4, gate G8): only
  // the node that is BOTH the Raft leader AND holds active_lease at the current
  // term may run and debit. A revived stale node, or any non-active node, gets
  // this and debits 0. Additive (field 7), so the wire stays compatible.
  DENIED_NOT_ACTIVE_LEASE = 7;
}

message CapabilityReceipt {
  uint32 schema_version = 1;
  Outcome outcome = 2;
  uint64 cost_sats = 3;          // actual metered cost debited (0 on any DENIED)
  uint64 treasury_remaining = 4; // authoritative post-debit balance, daemon-owned
  bytes proof = 5;               // opaque act receipt (ecash proof, LN preimage, or HTTP status and body hash)
  bytes completion = 6;          // brain-stub: the assistant reply TEXT, populated only for a Completion act.
                                 // These are the words the brain needs back to keep thinking; empty for every
                                 // other act. Returned verbatim on a DUPLICATE_IGNORED replay too (the ledger
                                 // persists it), so a post-resume re-issue gets the same words, not just the proof.
  MemoryResult memory = 7;       // durable-mind-state: the structured result of a Memory act (design doc 10 F5),
                                 // absent for every other act. Returned on a DUPLICATE_IGNORED write replay too
                                 // (the ledger persists the encoded result), so a resume re-issue gets the same
                                 // result, not just the proof. Reads carry it too (found/value/slugs) but are free.
}
